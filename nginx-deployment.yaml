apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: academy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      # 1. Reference the same shared volume strategy (or hostPath/EFS if sharing across nodes)
      # Note: For strict independent deployments across different nodes, combining 
      # them into a single dual-container Pod (as shown below) is highly recommended.
